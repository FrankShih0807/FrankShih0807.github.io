        summary: Department of Statistics. Advisor&#58; Prof. Faming Liang.
        highlights:
          - Proposed uncertainty-aware reinforcement learning methods with theoretical guarantees and empirical validation (ICLR 2024, TMLR 2025).
          - Constructed EFI-PINNs for PDEs (Poisson, Black-Scholes), enabling calibrated uncertainty quantification for physics-informed neural networks (NeurIPS 2025).
          - Developed EFI-based high-dimensional regression for biomarker discovery, integrating model selection and interval estimation in a unified EFI framework.

