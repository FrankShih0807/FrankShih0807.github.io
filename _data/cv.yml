        highlights:
          - Developing EFI-based methodology for high-dimensional survival analysis, providing calibrated uncertainty quantification and model selection for complex microbiome studies.
          - Extending EFI to LSTM models to quantify uncertainty in time-series predictions, with applications to CAR-T therapy.
