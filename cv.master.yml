# Master CV — single source of truth.
# Every entry has an `audience:` list. The build script filters by tag
# to produce each variant (cv-academic.pdf, cv-industry.pdf, short-bio.md, etc.).
#
# Audience tags used in this file:
#   all          – include in every variant
#   academic     – full academic CV (faculty/postdoc applications, tenure files)
#   grant        – NSF/NIH-style biosketch (succinct, methods/impact focused)
#   industry     – general industry applications (research scientist, applied scientist)
#   industry-ml  – ML-heavy industry roles (DeepMind, FAIR, Anthropic, etc.)
#   short-bio    – 2–4 line talk intro / panel blurb
#
# TODO markers flag things I couldn't extract from the .tex and that you
# should fill in before the first real build.

