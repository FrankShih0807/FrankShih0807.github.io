    website: ""   # will be filled once the site is live

summary:
  long: >
    Postdoctoral Research Scholar in Biostatistics and Machine Learning with
    research interests in uncertainty quantification, reinforcement learning,
    stochastic gradient MCMC, and extended fiducial inference. I develop
    statistically rigorous and scalable methods for deep learning and
    scientific computing, with applications to biomedical research
    (e.g., microbiome studies, CAR-T therapy). First-author publications in
    ICLR, NeurIPS, and TMLR.
  short: >
    Frank Shih is a postdoctoral research scholar at Memorial Sloan Kettering
    Cancer Center working on uncertainty quantification for deep learning and
    reinforcement learning, with applications to biomedical research.
    # TODO: confirm / tweak — this is a draft short bio for talk intros.

research_interests:
  - Uncertainty Quantification for Deep Learning
  - Reinforcement Learning
  - Stochastic Gradient MCMC
  - Extended Fiducial Inference

appointments:
  - role: Postdoctoral Research Scholar
    org: Memorial Sloan Kettering Cancer Center
    dept: Dept. of Epidemiology & Biostatistics
    location: New York, NY
    start: 2025-09
    end: present
    audience: [all]
    bullets:
      - text: >
          Develop EFI-based methodology for high-dimensional survival analysis,
          providing calibrated uncertainty quantification and model selection
          for complex microbiome studies.
        audience: [academic, grant]
      - text: >
          Extend EFI to LSTM models to quantify uncertainty in time-series
          predictions, with applications to CAR-T therapy.
        audience: [academic, industry-ml, grant]
      - text: >
          Collaborate with statisticians, computer scientists, and clinicians
          to translate these methods into practical tools for clinical and
          translational research.
        audience: [academic, industry, grant]

  - role: Graduate Research Assistant / PhD Candidate
    org: Purdue University
    dept: Dept. of Statistics
    location: West Lafayette, IN
    start: 2019-08
    end: 2025-08
    audience: [all]
    bullets:
      - text: >
          Proposed uncertainty-aware reinforcement learning methods with
          theoretical guarantees and empirical validation (ICLR 2024, TMLR 2025).
        audience: [academic, industry-ml, grant]
      - text: >
          Constructed EFI-PINNs for PDEs (Poisson, Black–Scholes), enabling
          calibrated uncertainty quantification for physics-informed neural
          networks (NeurIPS 2025).
        audience: [academic, grant]
      - text: >
          Developed EFI-based high-dimensional regression for biomarker
          discovery, integrating model selection and interval estimation in a
          unified EFI framework.
        audience: [academic, grant]

