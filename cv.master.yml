  name: Frank Shih
  headline: Postdoctoral Research Scholar in Biostatistics and Machine Learning
  affiliation: Memorial Sloan Kettering Cancer Center
  email: fshih37@gmail.com
  phone: "+1 (765) 701-8199"
  location: New York, NY
  links:
