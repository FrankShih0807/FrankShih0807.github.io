# for more options, see https://docs.rendercv.com/user_guide/yaml_input_structure/design/
design:
  theme: classic
  page:
    size: us-letter
    show_page_numbering: true
    show_last_updated_date: true
  colors:
    text: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
  text:
    font_family: New Computer Modern
    font_size: 10pt
    alignment: justified
  links:
    underline: true
    use_external_link_icon: false
  header:
    name_font_size: 26pt
    name_bold: true
    alignment: center
    use_icons_for_connections: true
